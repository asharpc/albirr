services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-albirr}
      POSTGRES_USER: ${DB_USER:-albirr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-albirr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-albirr} -d ${DB_NAME:-albirr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DB_ENGINE: ${DB_ENGINE:-postgres}
      DB_NAME: ${DB_NAME:-albirr}
      DB_USER: ${DB_USER:-albirr}
      DB_PASSWORD: ${DB_PASSWORD:-albirr}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
      DJANGO_SUPERUSER_FIRST_NAME: ${DJANGO_SUPERUSER_FIRST_NAME:-Admin}
      DJANGO_SUPERUSER_LAST_NAME: ${DJANGO_SUPERUSER_LAST_NAME:-User}
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    ports:
      - "${BACKEND_PORT:-9001}:9001"
    depends_on:
      db:
        condition: service_healthy
        required: false

  frontend:
    build:
      context: ./www
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9001/api/v1/}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  pgdata:
  media:
  static:
